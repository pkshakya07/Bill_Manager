<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Expense Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="number"], select, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .radio-group { display: flex; gap: 20px; margin-top: 5px; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #219150; }
        #preview { width: 100%; margin-top: 15px; border-radius: 5px; display: none; }
        .status { text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Business Expense Capture</h2>
    
    <div class="form-group">
        <label>1. Take Bill Photo</label>
        <input type="file" accept="image/*" capture="environment" id="bill-camera" required>
        <img id="preview" alt="Receipt Preview">
    </div>

    <div class="form-group">
        <label>2. Amount (€)</label>
        <input type="number" id="amount" step="0.01" placeholder="e.g. 21.00" required>
    </div>

    <div class="form-group">
        <label>3. Expense Type</label>
        <div class="radio-group">
            <label><input type="radio" name="expense-type" value="Food" checked> Food</label>
            <label><input type="radio" name="expense-type" value="Stay"> Stay</label>
        </div>
    </div>

    <button id="save-btn" onclick="processAndSave()">Upload to Google Drive & Sheet</button>
    <div class="status" id="status-msg"></div>
</div>

<script>
    // Paste your Google Web App URL between the quotes below
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyY5MowO-aGTa4N2jbTIUXLAzMAbGAk1M49xIARn5FvfqNjL6gkwIVG_v8xOCGclqA/exec"; 
    let base64Image = "";

    document.getElementById('bill-camera').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('preview').src = event.target.result;
                document.getElementById('preview').style.display = "block";
                base64Image = event.target.result; 
            };
            reader.readAsDataURL(file);
        }
    });

    async function processAndSave() {
        const amount = document.getElementById('amount').value;
        const type = document.querySelector('input[name="expense-type"]:checked').value;
        const cameraInput = document.getElementById('bill-camera');
        const statusMsg = document.getElementById('status-msg');
        const saveBtn = document.getElementById('save-btn');

        if (!cameraInput.files.length || !amount) {
            alert("Please take a photo and enter an amount.");
            return;
        }

        saveBtn.disabled = true;
        statusMsg.style.color = "orange";
        statusMsg.innerText = "Uploading straight to Google Drive...";

        const now = new Date();
        const timestampStr = now.toLocaleString(); 
        const fileTimestamp = now.toISOString().split('T')[0]; 
        
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const currentMonthName = monthNames[now.getMonth()];
        
        // Formats file name explicitly by month (e.g., May_Expense_Food_2026-05-25.jpg)
        const structuralFileName = `${currentMonthName}_Expense_${type}_${fileTimestamp}.jpg`;

        const payload = {
            type: type,
            amount: amount + " Euro",
            timestamp: timestampStr,
            imageRaw: base64Image, 
            fileName: structuralFileName
        };

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            statusMsg.style.color = "green";
            statusMsg.innerText = "Success! Uploaded to Drive & Sheet.";
            
            document.getElementById('amount').value = "";
            document.getElementById('preview').style.display = "none";
            cameraInput.value = "";
            base64Image = ""; 
        } catch (error) {
            statusMsg.style.color = "red";
            statusMsg.innerText = "Upload failed. Check connections.";
            console.error(error);
        } finally {
            saveBtn.disabled = false;
        }
    }
</script>
</body>
</html>
